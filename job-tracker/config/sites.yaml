# List of sites to scrape.
#
# type: "static"  -> Requests + BeautifulSoup (fast, works for server-rendered HTML)
# type: "dynamic" -> Playwright (slower, needed for JS-rendered content or bot-checks)
# type: "rss"     -> feedparser (best case — no HTML scraping needed at all)
#
# For static/dynamic sites, selectors are CSS selectors relative to job_container.

- name: "charityjob"
  url: "https://www.charityjob.co.uk/project-officer-jobs-in-london"
  type: "static"
  enabled: true
  selectors:
    # Each job result is inside a heading link like:
    # <h2><a href="...">Job Title</a></h2> followed by org/location text
    job_container: "h2 a[href*='/jobs/']"
    title: null          # the container itself is the title link
    link: null            # href comes from the container
    location: null        # not reliably separable via static selectors; captured in raw text
  notes: >
    Server-rendered, no JS needed. Selector targets job title links directly
    since CharityJob's DOM doesn't cleanly separate title/org/location into
    distinct classes on this listing page. The scraper extracts surrounding
    text for org + location. Verify selectors periodically — CharityJob does
    redesign occasionally.

- name: "w4mpjobs"
  url: "https://www.w4mpjobs.org/RSS.aspx"
  type: "rss"
  enabled: true
  fetch_details: true
  detail_fetch_limit: 50
  notes: >
    w4mpjobs publishes an official RSS feed. Location and organisation come
    directly from the feed's <category> and <author> fields. Salary is
    rarely present in the feed itself, so fetch_details is enabled: for the
    most recent 50 listings each run (feed is newest-first), the scraper
    follows the job's link to JobDetails.aspx and pulls an accurate salary
    from the structured fields there. This adds ~0.5s delay per job
    (~25s total for 50 jobs) to be polite to the source site — bounded to
    50 rather than all ~150+ listings since most of those are already in
    the database from previous runs and don't need re-fetching. Increase
    detail_fetch_limit if you want deeper backfill on a one-off run.

